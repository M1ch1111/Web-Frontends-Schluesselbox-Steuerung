<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h3 class="card-title text-center mb-4">🔑 Schlüsselbox</h3>

        <!-- Fehlermeldung: Wird nur angezeigt, wenn login_error true ist -->
        @if (login_error) {
          <div class="alert alert-danger" role="alert">
            Falsche E-Mail oder Passwort!
          </div>
        }

        <form>
          <div class="mb-3">
            <label for="email" class="form-label">E-Mail Adresse</label>
            <input type="email" class="form-control" id="email" #email placeholder="admin">
          </div>
          <div class="mb-4">
            <label for="password" class="form-label">Passwort</label>
            <input type="password" class="form-control" id="password" #password placeholder="admin">
          </div>
          <div class="d-grid">
            <!-- Beim Klick übergeben wir die Werte der Input-Felder an die TypeScript-Funktion -->
            <button type="button" class="btn btn-primary" (click)="onSubmit(email.value, password.value)">
              Anmelden
            </button>
          </div>
        </form>

      </div>
    </div>
  </div>
</div>
