<main class="min-vh-100 w-100 d-flex align-items-center justify-content-center">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-8 col-md-6 col-lg-5 text-center">
        
        <div class="card glass-card border-0 p-4">
          <div class="card-body py-5">
            
            <div class="error-icon-container mb-4">
              <span class="error-emoji">🔍</span>
            </div>
            
            <h1 class="display-1 fw-bold mb-2 text-gradient">404</h1>
            <h3 class="fw-bold mb-3 text-dark">Seite nicht gefunden</h3>
            <p class="text-muted mb-5">
              Die gesuchte Adresse existiert nicht oder ist ungültig.
            </p>
            
            <a [routerLink]="getRedirectRoute()" class="btn btn-home-gradient btn-lg w-100 rounded-pill border-0 text-white fw-bold py-3">
              {{ getButtonText() }}
            </a>
            
          </div>
        </div>
        
      </div>
    </div>
  </div>
</main>
