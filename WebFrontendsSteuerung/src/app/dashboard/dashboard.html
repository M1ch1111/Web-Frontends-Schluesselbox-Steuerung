<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>🏠 Mein Dashboard</h2>
    <button class="btn btn-outline-danger rounded-pill px-4" (click)="logout()">Abmelden</button>
  </div>

  <div class="row g-4">

    <!-- Linke Spalte: Status -->
    <div class="col-md-6">

      <!-- Tür Status Karte -->
      <div class="card border-0 shadow-sm rounded-4 mb-4">
        <div class="card-body p-4 text-center">
          <h5 class="text-muted mb-3">Türstatus</h5>
          @if (tuerOffen) {
            <div class="display-1 text-danger mb-2">🔓</div>
            <h3 class="text-danger">Geöffnet</h3>
          } @else {
            <div class="display-1 text-success mb-2">🔒</div>
            <h3 class="text-success">Geschlossen</h3>
          }
        </div>
      </div>

      <!-- Allgemeine Infos -->
      <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-4">
          <h5 class="card-title">Systemstatus</h5>
          <p class="card-text text-primary font-monospace">{{ boxStatus }}</p>
        </div>
      </div>

    </div>

    <!-- Rechte Spalte: Schlüsselplätze & Aktionen -->
    <div class="col-md-6">

      <!-- Schlüsselplätze -->
      <div class="card border-0 shadow-sm rounded-4 mb-4">
        <div class="card-body p-4">
          <h5 class="card-title mb-4">🔑 Schlüssel Erkennung</h5>

          <div class="d-flex justify-content-between">
            @for (platz of schluesselPlaetze; track $index) {
              <div class="text-center">
                <div class="rounded-circle d-flex align-items-center justify-content-center mb-2 mx-auto"
                     [class.bg-success]="platz !== 'leer'"
                     [class.bg-secondary]="platz === 'leer'"
                     style="width: 50px; height: 50px; color: white;">
                  {{ $index + 1 }}
                </div>
                <!-- NEU: Gibt den Namen aus, wenn nicht leer, ansonsten "Leer" -->
                <small class="text-muted fw-bold">{{ platz !== 'leer' ? platz : 'Leer' }}</small>
              </div>
            }
          </div>

        </div>
      </div>

      <!-- An den ESP32 senden (Wetter & Müll) -->
      <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-4">
          <h5 class="card-title mb-3">📡 Daten an Box senden</h5>

          <div class="mb-3">
            <label class="form-label text-muted">Wetter Update:</label>
            <div class="btn-group w-100">
              <button class="btn btn-outline-primary" (click)="sendeWetter('Sonnig 25°C')">☀️ Sonnig</button>
              <button class="btn btn-outline-info" (click)="sendeWetter('Regen 15°C')">🌧️ Regen</button>
            </div>
          </div>

          <div>
            <label class="form-label text-muted">Müllabfuhr Erinnerung:</label>
            <div class="btn-group w-100">
              <button class="btn btn-outline-dark" (click)="sendeMuell('Restmüll')">🗑️ Restmüll</button>
              <button class="btn btn-outline-warning" (click)="sendeMuell('Gelber Sack')">♻️ Gelber Sack</button>
            </div>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>
